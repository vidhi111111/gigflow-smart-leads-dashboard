version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: servicehive_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=servicehive
    networks:
      - mern_network

  backend:
    build: ./backend
    container_name: servicehive_backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/servicehive
      - JWT_SECRET=supersecretjwtkey123
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - mern_network

  frontend:
    build: ./frontend
    container_name: servicehive_frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - mern_network

volumes:
  mongo_data:

networks:
  mern_network:
    driver: bridge
